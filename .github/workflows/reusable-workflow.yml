name: Deployment - Resusable Workflow

on:
  workflow_call:
    inputs:
      kubectl_version:
        description: 'Version of kubectl to use'
        required: false
        default: 'v1.35.0'
        type: string
      environment_name:
        description: 'Name of the environment to deploy to'
        required: true
        default: development
        type: string
    secrets:
      KUBE_CONFIG:
        required: true
      MONGO_PASSWORD:
        required: true
    outputs:
      application_ingress_url:
        description: 'URL of the application ingress'
        value: ${{ jobs.reuse-deploy.outputs.APP_INGRESS_URL }}
jobs:
    reuse-deploy:
      environment:
        name: ${{ inputs.environment_name }}
        url: https://${{ steps.set-ingress-host-address.outputs.APP_INGRESS_URL }}
      runs-on: ubuntu-latest
      outputs:
        APP_INGRESS_URL: ${{ steps.set-ingress-host-address.outputs.APP_INGRESS_URL }}
      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Install kubectl Cli
          uses: azure/setup-kubectl@v3
          with:
            version: ${{ inputs.kubectl_version }}
        - name: Setup Kubeconfig
          uses: azure/k8s-set-context@v3
          with:
             method: kubeconfig
             kubeconfig: ${{ secrets.KUBE_CONFIG }}

        - name: Fetch Kubernetes Cluster Details
          run: |
            kubectl version
            echo "-----------------------------"
            kubectl get nodes -o wide
            echo "-----------------------------"

        - name: Save Nginx Ingress Controller IP as a GitHub Environment Variable
          run: |
            # 1. Make sure the namespace exists
            if ! kubectl get namespace ingress-nginx >/dev/null 2>&1; then
            echo "::error::Namespace 'ingress-nginx' not found. Install NGINX Ingress Controller on the cluster first."
            exit 1
            fi

            # 2. Read the IP from spec.externalIPs[0] (our Option A setup)
            #    Fallback to status.loadBalancer.ingress[0].ip (standard LoadBalancer setup)
            INGRESS_IP=$(kubectl -n ingress-nginx get svc ingress-nginx-controller \
              -o jsonpath='{.spec.externalIPs[0]}' 2>/dev/null || true)

            if [ -z "$INGRESS_IP" ]; then
              INGRESS_IP=$(kubectl -n ingress-nginx get svc ingress-nginx-controller \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
            fi

            # 3. Fail loudly if we still have nothing
            if [ -z "$INGRESS_IP" ]; then
              echo "::error::Could not resolve ingress controller IP from spec.externalIPs or status.loadBalancer."
              exit 1
            fi

            echo "INGRESS_IP=$INGRESS_IP" >> "$GITHUB_ENV"
            echo "Resolved INGRESS_IP=$INGRESS_IP"

        - name: Replace Tokens in Manifest Files
          uses: cschleiden/replace-tokens@v1
          with:
            tokenPrefix: '_{_'
            tokenSuffix: '_}_'
            files: '["kubernetes/${{ inputs.environment_name }}/*.yaml"]'
          env:
            NAMESPACE: ${{ vars.NAMESPACE }}
            REPLICAS: ${{ vars.REPLICAS || 1 }}
            IMAGE: ${{ vars.DOCKER_USERNAME }}/solar-system:${{ github.sha }}
            INGRESS_IP: ${{ env.INGRESS_IP }}
        - name: Check files
          run: |
            cat kubernetes/${{ inputs.environment_name }}/deployment.yaml
            echo "-----------------------------"
            cat kubernetes/${{ inputs.environment_name }}/service.yaml
            echo "-----------------------------"
            cat kubernetes/${{ inputs.environment_name }}/ingress.yaml
        
        - name: Create Namespace
          run: |
            kubectl create namespace ${{ vars.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

        - name: Create MongoDB Secret
          # continue-on-error: true
          env:
            MONGO_URI: mongodb://mongo-db:27017/solar-system?authSource=admin
            MONGO_USERNAME: non-prod-user
            MONGO_PASSWORD: non-prod-password
          run: |
            kubectl create secret generic mongo-db-creds -n ${{ vars.NAMESPACE }} \
              --from-literal=MONGO_URI=$MONGO_URI \
              --from-literal=MONGO_USERNAME=$MONGO_USERNAME \
              --from-literal=MONGO_PASSWORD=$MONGO_PASSWORD \
              --save-config -o yaml --dry-run=client | kubectl apply -f -
        
        - name: Deploy to Dev Env
          run: |
            kubectl apply -f kubernetes/${{ inputs.environment_name }}/mongo-deployment.yaml
            kubectl apply -f kubernetes/${{ inputs.environment_name }}/mongo-service.yaml
            kubectl apply -f kubernetes/${{ inputs.environment_name }}/deployment.yaml
            kubectl apply -f kubernetes/${{ inputs.environment_name }}/service.yaml
            kubectl apply -f kubernetes/${{ inputs.environment_name }}/ingress.yaml
        
        - name: Wait for resources
          run: |
            kubectl rollout status deployment/mongo-db --timeout=300s -n ${{ vars.NAMESPACE }}
            kubectl rollout status deployment/solar-system --timeout=300s -n ${{ vars.NAMESPACE }}
            kubectl wait --for=condition=Available ingress/solar-system --timeout=300s -n ${{ vars.NAMESPACE }}
        
        - name: Set App Ingress Host URL
          id: set-ingress-host-address
          run: |
            echo "APP_INGRESS_URL=$(kubectl -n ${{ vars.NAMESPACE }} get ingress solar-system -o jsonpath='{.spec.tls[0].hosts[0]}')" >> "$GITHUB_OUTPUT"